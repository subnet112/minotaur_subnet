name: Tests

# Scope: Python package tests only. Contract (Foundry) tests live alongside
# the contracts in subnet112/minotaur_contracts and are exercised by that
# repo's own CI. Anvil/Docker-bound emulation and fork suites still live in
# the dev tree but aren't gated here — GitHub-hosted runners don't have the
# fork RPC creds or the running containers those suites assume.

on:
  push:
    branches: [main, develop, crosschain]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
      - name: Build JS sandbox native dep (isolated-vm)
        # runner.js runs UNTRUSTED App-scoring JS in a real V8 isolate; the
        # node-based sandbox tests (test_runner_js_*, test_sandbox_*) shell out
        # to `node runner.js`, which requires isolated-vm from engine/node_modules.
        # ubuntu-latest ships node + npm + a C++ toolchain. `npm ci` installs the
        # exact, hash-verified lockfile.
        working-directory: minotaur_subnet/engine
        run: npm ci --omit=dev --no-audit --no-fund
      - name: Unit tests
        run: make test-unit

  cross-chain-tests:
    # Dev-track lane: exercises minotaur_subnet/bridge/* and the multi-leg
    # path that is gated behind CROSS_CHAIN_ENABLED=0 in beta. Runs on every
    # PR so the code stays compiling even while the runtime flag is off.
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create virtualenv and install dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
      - name: Cross-chain tests (dev-track)
        run: make test-cross-chain
