name: Solver Base Image

on:
  push:
    branches: [main]
    paths:
      - "minotaur_subnet/docker/Dockerfile.solver-base"
      - "minotaur_subnet/docker/build-solver-base.sh"
      - "minotaur_subnet/docker/requirements.solver-base.txt"
      - "minotaur_subnet/sdk/**"
      - "minotaur_subnet/harness/runner.py"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push solver-base image
        run: bash minotaur_subnet/docker/build-solver-base.sh --push
