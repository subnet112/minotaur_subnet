name: Build and Publish Validator Image

# Builds the validator/API service image (the full subnet stack —
# API, blockloop, benchmark worker, relayer client) from
# minotaur_subnet/Dockerfile and pushes to GHCR so external
# validators can `docker pull` instead of cloning + building.
#
# Tags applied (branch → tag mapping is the release model):
#   - :latest                  (push to `develop` — the integration line;
#                               may be unstable, runs on our own validator)
#   - :stable                  (push to `main` — the release line; `main`
#                               only advances via a verified merge from
#                               `develop`, so :stable is always vetted)
#   - :sha-<short-sha>         (always, immutable per-commit)
#   - :<git-tag>               (when a v* tag is pushed)
#
# Multi-arch: linux/amd64 + linux/arm64.
#
# Requires recursive submodule checkout — the Dockerfile copies
# contracts/ which is a submodule pointing at subnet112/minotaur_contracts.

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:

# Serialize publishes PER REF so two overlapping builds can't race the shared
# floating tag (:latest on develop, :stable on main). Without this, the
# later-FINISHING build wins the tag — which can be an OLDER commit if an earlier
# build runs long. cancel-in-progress cancels an in-flight build when a newer push
# to the same ref arrives, so only the latest commit's image ever lands on the tag.
# Per-ref group (main / develop / each v-tag isolated) so they never cancel across
# release lines.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Hyphen, not the underscored repo name — GHCR auto-link to the
  # `minotaur_subnet` repo silently rejected `packages: write` under the
  # subnet112 org. Decoupling the package name from the repo name dodges
  # that, and "minotaur-validator" is a more meaningful name for operators
  # anyway (vs the package-only-incidental "minotaur_subnet" repo path).
  IMAGE_NAME: subnet112/minotaur-validator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # id-token: write is REQUIRED for cosign keyless signing (OIDC).
      # Without it `cosign sign --yes` will fail at the final step.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: minotaur_subnet/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MINOTAUR_IMAGE_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # Supply-chain integrity (PR-5a of security hardening series).
      # Partial close of audit H11. Every push of the validator image is:
      #   1. Inventoried via a CycloneDX SBOM published as a workflow
      #      artifact for operator/auditor inspection.
      #   2. Signed by cosign keyless (OIDC) so operators can verify
      #      the image they pull was built by this repo's CI.
      #
      # The Trivy CVE gate is intentionally NOT included in this PR —
      # it lands in a follow-up after the operator triages the current
      # baseline of HIGH/CRITICAL CVEs in the image (a clean-launch
      # `exit-code: '1'` Trivy gate would block every build today).
      # Plan: rebase the deferred PR-5b once a `.trivyignore` policy
      # exists.
      # ------------------------------------------------------------------

      # TODO(sec): pin to a release SHA from
      # https://github.com/anchore/sbom-action/releases
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.17.8
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          upload-artifact: true
          upload-release-assets: false

      # TODO(sec): pin to a release SHA from
      # https://github.com/sigstore/cosign-installer/releases
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image with cosign keyless
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
