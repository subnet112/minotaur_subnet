services:
  anvil-fork:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8546"
      - "--fork-url"
      - "${FORK_RPC_URL}"
      - "--chain-id"
      - "1"
      - "--accounts"
      - "10"
      - "--silent"
    ports:
      - "8546:8546"
    environment:
      - FORK_RPC_URL=${FORK_RPC_URL}
