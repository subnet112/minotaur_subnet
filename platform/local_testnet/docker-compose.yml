    entrypoint: ["/bin/sh", "-c"]
    command: ["set -a && . /config/testnet.env 2>/dev/null; export VALIDATOR_HOTKEY_SS58=\"$${VALIDATOR_0_HOTKEY_SS58:-$${VALIDATOR_HOTKEY_SS58:-}}\"; set +a; exec python -m minotaur_subnet.validator.main --port 9100 --store-path /data/store.json"]
    ports:
