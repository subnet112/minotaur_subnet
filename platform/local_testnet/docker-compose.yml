# ──────────────────────────────────────────────────────────────────────────────
# Minotaur Local Testnet — Full Stack
#
# Spins up a self-contained environment:
#   subtensor  — local Bittensor chain (fast blocks)
#   anvil      — Ethereum mainnet fork (real liquidity)
#   anvil-base — Base mainnet fork (multi-chain testing)
#   lit-bridge — wallet creation/signing sidecar (ethers.js)
#   init       — bootstraps subnet + deploys contracts (runs once)
#   api        — App Intents REST API
#   relayer    — EVM transaction relayer
#   validator  — App Intents validator
#   miner      — App Intents miner
#
# Usage:
#   cp .env.example .env   # set ALCHEMY_RPC_URL + BASE_ALCHEMY_RPC_URL
#   docker compose up --build -d
# ──────────────────────────────────────────────────────────────────────────────

networks:
  minotaur-testnet:
    driver: bridge

volumes:
  testnet-config:
  store-data:
  bittensor-wallets:

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  subtensor:
    image: ghcr.io/opentensor/subtensor-localnet:devnet-ready
    ports:
      - "${HOST_SUBTENSOR_WS_PORT:-9944}:9944"
      - "${HOST_SUBTENSOR_RPC_PORT:-9945}:9945"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9944' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
      - "--fork-url"
      - "${ALCHEMY_RPC_URL}"
      - "--chain-id"
      - "31337"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
      - "--block-time"
      - "${BLOCK_TIME:-2}"
    ports:
      - "${HOST_ANVIL_ETH_PORT:-8545}:8545"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  anvil-base:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8546"
      - "--fork-url"
      - "${BASE_ALCHEMY_RPC_URL}"
      - "--chain-id"
      - "8453"
      - "--accounts"
      - "10"
      - "--balance"
      - "10000"
      - "--block-time"
      - "${BLOCK_TIME:-2}"
    ports:
      - "${HOST_ANVIL_BASE_PORT:-8546}:8546"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8546 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  anvil-btevm:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8547"
      - "--fork-url"
      - "${BITTENSOR_EVM_RPC_URL:-https://lite.chain.opentensor.ai}"
      - "--chain-id"
      - "964"
      - "--accounts"
      - "1"
      - "--balance"
      - "10000"
      - "--block-time"
      - "${BLOCK_TIME:-2}"
      - "--no-storage-caching"
      - "--fork-retry-backoff"
      - "5000"
      - "--retries"
      - "10"
      - "--timeout"
      - "60000"
    ports:
      - "${HOST_ANVIL_BTEVM_PORT:-8547}:8547"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8547 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  lit-bridge:
    build: ./lit-bridge
    ports:
      - "${HOST_LIT_BRIDGE_PORT:-3100}:3100"
    environment:
      PORT: "3100"
      ANVIL_RPC_URL: http://anvil:8545
      BASE_RPC_URL: http://anvil-base:8546
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3100/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      anvil:
        condition: service_healthy
      anvil-base:
        condition: service_healthy

  # ── Bootstrap (runs once, then exits) ──────────────────────────────────────

  init:
    build:
      context: ../..
      dockerfile: platform/local_testnet/Dockerfile.init
    command: ["python", "/app/platform/local_testnet/init.py"]
    environment:
      SUBTENSOR_URL: ws://subtensor:9944
      ANVIL_RPC_URL: http://anvil:8545
      BASE_RPC_URL: http://anvil-base:8546

      DEPLOYER_PRIVATE_KEY: "${ANVIL_RELAYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      # Anvil accounts 2-4 (validators), sorted by address ascending
      VALIDATORS: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC,0x70997970C51812dc3A010C7d01b50e0d17dc79C8,0x90F79bf6EB2c4f870365E785982E1f101E93b906"
      # On-chain quorum: must match off-chain ORDER_CONSENSUS_QUORUM_BPS for
      # 2-of-3 validator failure tolerance
      QUORUM_BPS: "${QUORUM_BPS:-6666}"
      SCORE_THRESHOLD: "${SCORE_THRESHOLD:-5000}"
      BITTENSOR_EVM_RPC_URL: http://anvil-btevm:8547
    volumes:
      - testnet-config:/config
      - bittensor-wallets:/root/.bittensor/wallets
    networks:
      - minotaur-testnet
    depends_on:
      anvil:
        condition: service_healthy
      anvil-base:
        condition: service_healthy
      anvil-btevm:
        condition: service_healthy
      subtensor:
        condition: service_started

  # ── Application Services ───────────────────────────────────────────────────

  seed:
    build:
      context: ../..
      dockerfile: minotaur_subnet/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["set -a && . /config/testnet.env 2>/dev/null; set +a; exec python /app/platform/local_testnet/seed.py"]
    environment:
      MINOTAUR_API_URL: http://api:8080
    volumes:
      - testnet-config:/config
    networks:
      - minotaur-testnet
    depends_on:
      api:
        condition: service_healthy

  # Leader API: runs BlockLoop, benchmark worker, round coordinator.
  # Proposes order consensus to validator peers, champion consensus to API peers.
  api:
    build:
      context: ../..
      dockerfile: minotaur_subnet/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["set -a && . /config/testnet.env 2>/dev/null; export VALIDATOR_HOTKEY_SS58=\"$${VALIDATOR_0_HOTKEY_SS58:-$${VALIDATOR_HOTKEY_SS58:-}}\"; set +a; exec python -m minotaur_subnet.api.server --port 8080"]
    ports:
      - "${HOST_API_PORT:-8080}:8080"
    environment:
      # Enable dev-only routes (faucet, direct-stake, replay-debug). Prod
      # leaves this unset so the local_testnet router is never mounted.
      LOCAL_TESTNET: "1"

      ANVIL_RPC_URL: http://anvil:8545
      BASE_RPC_URL: http://anvil-base:8546
      BITTENSOR_EVM_RPC_URL: http://anvil-btevm:8547

      SUBTENSOR_URL: ws://subtensor:9944
      NETUID: "1"
      WALLET_NAME: validator
      HOTKEY_NAME: default
      LIT_BRIDGE_URL: http://lit-bridge:3100
      RELAYER_PRIVATE_KEY: "${ANVIL_RELAYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      MVP_DEMO_MODE: "${MVP_DEMO_MODE:-1}"
      ENABLE_NATIVE_BITTENSOR_PROXY: "${ENABLE_NATIVE_BITTENSOR_PROXY:-0}"
      NATIVE_BITTENSOR_NETWORK: "${NATIVE_BITTENSOR_NETWORK:-}"
      NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON: "${NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON:-}"
      NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON: "${NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON:-}"
      USE_EVM_RELAYER: "1"
      ENABLE_BENCHMARK_WORKER: "1"
      SUBMISSIONS_ACCEPTING: "1"
      SUBMISSIONS_RATE_LIMIT_PER_MINUTE: "0"
      SUBMISSION_ALLOWED_REPO_HOSTS: "${SUBMISSION_ALLOWED_REPO_HOSTS:-}"
      SUBMISSION_GIT_CLONE_ALLOWED_HOSTS: "${SUBMISSION_GIT_CLONE_ALLOWED_HOSTS:-}"
      SUBMISSION_GIT_CLONE_USERNAME: "${SUBMISSION_GIT_CLONE_USERNAME:-}"
      SUBMISSION_GIT_CLONE_PASSWORD: "${SUBMISSION_GIT_CLONE_PASSWORD:-}"
      ENABLE_SOURCE_SUBMISSIONS: "1"
      ALLOW_SUBPROCESS_BENCHMARK: "1"
      ALLOW_CHAMPION_HOT_SWAP: "1"
      REQUIRE_SIGNED_PROVENANCE: "1"
      REQUIRE_ASYMMETRIC_PROVENANCE: "1"
      SUBMISSION_PROVENANCE_SIGNING_PRIVATE_KEY: "${VALIDATOR_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      SUBMISSION_PROVENANCE_ALLOWED_SIGNERS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      APP_INTENTS_STORE_PATH: /data/store.json
      SUBMISSION_STORE_PATH: /data/submissions.json
      SOLVER_ROUND_STORE_PATH: /data/solver_rounds.json
      ALLOW_FILE_REPO_URLS: "1"
      BENCHMARK_DOCKER_NETWORK: "local_testnet_minotaur-testnet"
      BENCHMARK_POLL_INTERVAL: "${BENCHMARK_POLL_INTERVAL:-5}"
      SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS: "${SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS:-2}"
      SOLVER_ROUND_OPEN_SECONDS: "${SOLVER_ROUND_OPEN_SECONDS:-600}"
      SOLVER_ROUND_DECISION_EPOCHS: "${SOLVER_ROUND_DECISION_EPOCHS:-20}"
      SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS: "${SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS:-1}"
      CHAMPION_CONSENSUS_TIMEOUT_SECONDS: "${CHAMPION_CONSENSUS_TIMEOUT_SECONDS:-30}"
      # Anvil accounts 1-3 (validators) — enables local testnet consensus
      VALIDATOR_PRIVATE_KEYS: "${VALIDATOR_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d},${VALIDATOR_KEY_0:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a},${VALIDATOR_KEY_2:-0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6}"
      # -- Order execution consensus --
      # "local" = auto-sign all keys locally (fast, no peer needed)
      # "real"  = broadcast to validator peers for independent re-sim + re-score
      CONSENSUS_MODE: "${CONSENSUS_MODE:-local}"
      # Peers for real order consensus (validator services, NOT api peers).
      # Order quorum is now sourced from ValidatorRegistry.quorumBps() on chain
      # — no env override here; refactor/single-quorum-source.
      ORDER_CONSENSUS_PEERS: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC@http://validator:9100,0x70997970C51812dc3A010C7d01b50e0d17dc79C8@http://validator-peer-1:9100,0x90F79bf6EB2c4f870365E785982E1f101E93b906@http://validator-peer-2:9100"
      # -- Champion certification consensus (across API cluster) --
      # ChampionRegistry retains its own independent quorum knob; mirror the
      # on-chain ChampionRegistry.quorumBps() value here.
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_KEY_0:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a}"
      CHAMPION_QUORUM_BPS: "${API_CLUSTER_QUORUM_BPS:-6666}"
      CHAIN_ID: "31337"
      SOLVER_ROUND_INTERNAL_API_KEY: "${SOLVER_ROUND_INTERNAL_API_KEY:-minotaur-internal-round-secret}"
      SOLVER_ROUND_EPOCH_SECONDS: "${SOLVER_ROUND_EPOCH_SECONDS:-60}"
      # Fee model (skeleton): set FEE_ENABLED=1 to require fee accounting
      FEE_ENABLED: "${FEE_ENABLED:-0}"
      DEFAULT_FEE_WEI: "${DEFAULT_FEE_WEI:-10000000000000000}"
    volumes:
      - testnet-config:/config:ro
      - store-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - bittensor-wallets:/root/.bittensor/wallets:ro
      - "${LOCAL_TESTNET_SUBMISSION_HOST_ROOT:-/tmp/minotaur-testnet-submissions}:/solver-submissions:ro"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      init:
        condition: service_completed_successfully
      lit-bridge:
        condition: service_healthy


  # Champion consensus peer: signs champion certification proposals from leader API.
  api-peer-1:
    build:
      context: ../..
      dockerfile: minotaur_subnet/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["set -a && . /config/testnet.env 2>/dev/null; export VALIDATOR_HOTKEY_SS58=\"$${VALIDATOR_1_HOTKEY_SS58:-}\"; set +a; exec python -m minotaur_subnet.api.server --port 8080"]
    ports:
      - "${HOST_API_PEER_1_PORT:-8081}:8080"
    environment:
      ANVIL_RPC_URL: http://anvil:8545
      BASE_RPC_URL: http://anvil-base:8546
      BITTENSOR_EVM_RPC_URL: http://anvil-btevm:8547
      SUBTENSOR_URL: ws://subtensor:9944
      NETUID: "1"
      WALLET_NAME: validator_peer_1
      HOTKEY_NAME: default
      LIT_BRIDGE_URL: http://lit-bridge:3100
      RELAYER_PRIVATE_KEY: "${ANVIL_RELAYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      MVP_DEMO_MODE: "${MVP_DEMO_MODE:-1}"
      ENABLE_NATIVE_BITTENSOR_PROXY: "${ENABLE_NATIVE_BITTENSOR_PROXY:-0}"
      NATIVE_BITTENSOR_NETWORK: "${NATIVE_BITTENSOR_NETWORK:-}"
      NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON: "${NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON:-}"
      NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON: "${NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON:-}"
      USE_EVM_RELAYER: "1"
      ENABLE_BENCHMARK_WORKER: "1"
      SUBMISSIONS_ACCEPTING: "1"
      SUBMISSIONS_RATE_LIMIT_PER_MINUTE: "0"
      SUBMISSION_ALLOWED_REPO_HOSTS: "${SUBMISSION_ALLOWED_REPO_HOSTS:-}"
      SUBMISSION_GIT_CLONE_ALLOWED_HOSTS: "${SUBMISSION_GIT_CLONE_ALLOWED_HOSTS:-}"
      SUBMISSION_GIT_CLONE_USERNAME: "${SUBMISSION_GIT_CLONE_USERNAME:-}"
      SUBMISSION_GIT_CLONE_PASSWORD: "${SUBMISSION_GIT_CLONE_PASSWORD:-}"
      ENABLE_SOURCE_SUBMISSIONS: "1"
      ALLOW_SUBPROCESS_BENCHMARK: "1"
      ALLOW_CHAMPION_HOT_SWAP: "1"
      REQUIRE_SIGNED_PROVENANCE: "1"
      REQUIRE_ASYMMETRIC_PROVENANCE: "1"
      SUBMISSION_PROVENANCE_SIGNING_PRIVATE_KEY: "${VALIDATOR_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      SUBMISSION_PROVENANCE_ALLOWED_SIGNERS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      APP_INTENTS_STORE_PATH: /data/store.json
      SUBMISSION_STORE_PATH: /data/submissions.json
      SOLVER_ROUND_STORE_PATH: /data/solver_rounds.json
      ALLOW_FILE_REPO_URLS: "1"
      BENCHMARK_DOCKER_NETWORK: "local_testnet_minotaur-testnet"
      BENCHMARK_POLL_INTERVAL: "${BENCHMARK_POLL_INTERVAL:-5}"
      SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS: "${SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS:-2}"
      SOLVER_ROUND_OPEN_SECONDS: "${SOLVER_ROUND_OPEN_SECONDS:-600}"
      SOLVER_ROUND_DECISION_EPOCHS: "${SOLVER_ROUND_DECISION_EPOCHS:-20}"
      SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS: "${SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS:-1}"
      CHAMPION_CONSENSUS_TIMEOUT_SECONDS: "${CHAMPION_CONSENSUS_TIMEOUT_SECONDS:-30}"
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      CHAMPION_QUORUM_BPS: "${API_CLUSTER_QUORUM_BPS:-6666}"
      CHAIN_ID: "31337"
      SOLVER_ROUND_INTERNAL_API_KEY: "${SOLVER_ROUND_INTERNAL_API_KEY:-minotaur-internal-round-secret}"
      SOLVER_ROUND_EPOCH_SECONDS: "${SOLVER_ROUND_EPOCH_SECONDS:-60}"
    volumes:
      - testnet-config:/config:ro
      - store-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - bittensor-wallets:/root/.bittensor/wallets:ro
      - "${LOCAL_TESTNET_SUBMISSION_HOST_ROOT:-/tmp/minotaur-testnet-submissions}:/solver-submissions:ro"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      init:
        condition: service_completed_successfully
      lit-bridge:
        condition: service_healthy

  # Champion consensus peer: signs champion certification proposals from leader API.
  api-peer-2:
    build:
      context: ../..
      dockerfile: minotaur_subnet/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["set -a && . /config/testnet.env 2>/dev/null; export VALIDATOR_HOTKEY_SS58=\"$${VALIDATOR_2_HOTKEY_SS58:-}\"; set +a; exec python -m minotaur_subnet.api.server --port 8080"]
    ports:
      - "${HOST_API_PEER_2_PORT:-8082}:8080"
    environment:
      ANVIL_RPC_URL: http://anvil:8545
      BASE_RPC_URL: http://anvil-base:8546
      BITTENSOR_EVM_RPC_URL: http://anvil-btevm:8547
      SUBTENSOR_URL: ws://subtensor:9944
      NETUID: "1"
      WALLET_NAME: validator_peer_2
      HOTKEY_NAME: default
      LIT_BRIDGE_URL: http://lit-bridge:3100
      RELAYER_PRIVATE_KEY: "${ANVIL_RELAYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      MVP_DEMO_MODE: "${MVP_DEMO_MODE:-1}"
      ENABLE_NATIVE_BITTENSOR_PROXY: "${ENABLE_NATIVE_BITTENSOR_PROXY:-0}"
      NATIVE_BITTENSOR_NETWORK: "${NATIVE_BITTENSOR_NETWORK:-}"
      NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON: "${NATIVE_BITTENSOR_DELEGATE_ASSIGNMENTS_JSON:-}"
      NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON: "${NATIVE_BITTENSOR_DELEGATE_WALLETS_JSON:-}"
      USE_EVM_RELAYER: "1"
      ENABLE_BENCHMARK_WORKER: "1"
      SUBMISSIONS_ACCEPTING: "1"
      SUBMISSIONS_RATE_LIMIT_PER_MINUTE: "0"
      SUBMISSION_ALLOWED_REPO_HOSTS: "${SUBMISSION_ALLOWED_REPO_HOSTS:-}"
      SUBMISSION_GIT_CLONE_ALLOWED_HOSTS: "${SUBMISSION_GIT_CLONE_ALLOWED_HOSTS:-}"
      SUBMISSION_GIT_CLONE_USERNAME: "${SUBMISSION_GIT_CLONE_USERNAME:-}"
      SUBMISSION_GIT_CLONE_PASSWORD: "${SUBMISSION_GIT_CLONE_PASSWORD:-}"
      ENABLE_SOURCE_SUBMISSIONS: "1"
      ALLOW_SUBPROCESS_BENCHMARK: "1"
      ALLOW_CHAMPION_HOT_SWAP: "1"
      REQUIRE_SIGNED_PROVENANCE: "1"
      REQUIRE_ASYMMETRIC_PROVENANCE: "1"
      SUBMISSION_PROVENANCE_SIGNING_PRIVATE_KEY: "${VALIDATOR_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      SUBMISSION_PROVENANCE_ALLOWED_SIGNERS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
      APP_INTENTS_STORE_PATH: /data/store.json
      SUBMISSION_STORE_PATH: /data/submissions.json
      SOLVER_ROUND_STORE_PATH: /data/solver_rounds.json
      ALLOW_FILE_REPO_URLS: "1"
      BENCHMARK_DOCKER_NETWORK: "local_testnet_minotaur-testnet"
      BENCHMARK_POLL_INTERVAL: "${BENCHMARK_POLL_INTERVAL:-5}"
      SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS: "${SOLVER_ROUND_COORDINATOR_INTERVAL_SECONDS:-2}"
      SOLVER_ROUND_OPEN_SECONDS: "${SOLVER_ROUND_OPEN_SECONDS:-600}"
      SOLVER_ROUND_DECISION_EPOCHS: "${SOLVER_ROUND_DECISION_EPOCHS:-20}"
      SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS: "${SOLVER_ROUND_ACTIVATION_DELAY_EPOCHS:-1}"
      CHAMPION_CONSENSUS_TIMEOUT_SECONDS: "${CHAMPION_CONSENSUS_TIMEOUT_SECONDS:-30}"
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_KEY_2:-0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6}"
      CHAMPION_QUORUM_BPS: "${API_CLUSTER_QUORUM_BPS:-6666}"
      CHAIN_ID: "31337"
      SOLVER_ROUND_INTERNAL_API_KEY: "${SOLVER_ROUND_INTERNAL_API_KEY:-minotaur-internal-round-secret}"
      SOLVER_ROUND_EPOCH_SECONDS: "${SOLVER_ROUND_EPOCH_SECONDS:-60}"
    volumes:
      - testnet-config:/config:ro
      - store-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - bittensor-wallets:/root/.bittensor/wallets:ro
      - "${LOCAL_TESTNET_SUBMISSION_HOST_ROOT:-/tmp/minotaur-testnet-submissions}:/solver-submissions:ro"
    networks:
      - minotaur-testnet
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      init:
        condition: service_completed_successfully
      lit-bridge:
        condition: service_healthy

  # Relayer: fronts gas, submits co-signed transactions on-chain, deploys contracts.
  relayer:
    build:
      context: ../..
      dockerfile: minotaur_subnet/Dockerfile
    entrypoint: ["/bin/sh", "-c"]
