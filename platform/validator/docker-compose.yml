# Canonical Minotaur Subnet 112 validator stack — follower role.
#
# Six core containers + one optional auto-update side-container:
#   - 3× Anvil forks (Ethereum, Base, BT EVM) for proposal re-simulation
#   - 1× validator daemon (order-consensus signer + weight emitter)
#   - 1× api service (champion-consensus signer)
#   - 1× docker-socket-proxy (limits the api service's Docker access to
#     just spawning solver containers — used during reactive benchmarking
#     of champion candidates, rejected if it can't validate them)
#   - 1× watchtower (OPT-IN via `--profile autoupdate`) — polls GHCR for
#     new :stable image and recreates validator + api when the tag moves.
#     Subnet team controls promotion cadence; third-party validators
#     don't get surprise upgrades from every commit to main.
#
# Quickstart:
#   cp .env.example .env
#   # fill in YOUR_* placeholders in .env
#   docker compose --profile autoupdate up -d   # with auto-update
#   # ── or ──
#   docker compose up -d                         # without auto-update (manual pulls)
#
#   docker compose logs -f validator api
#
# What this stack does NOT do:
#   - Run the relayer (transaction submitter is operated by the subnet
#     team — third-party validators never deal with gas keys).
#   - Propose orders or champion certifications (only the highest-stake
#     validator's leader-api does that). Followers receive proposals
#     from the leader, verify them, and sign approvals.
#
# See docs/validator/quickstart.md for the full setup, on-chain
# registration, and operational notes including the every-6h
# anvil-recycle cron.

services:
  # ── Anvil forks ──────────────────────────────────────────────────────
  # One per supported chain. Anvil's "fork" mode replays a real chain
  # locally so the validator can re-simulate execution plans against the
  # same state the leader saw, without touching mainnet.
  #
  # On the `minotaur` net ONLY: the validator + api reach the forks here for
  # re-simulation. The forks are intentionally NOT on the sealed
  # benchmark-sandbox net — an untrusted benchmark solver on that net must be
  # able to reach ONLY the block-pin proxy (172.30.0.5), never a raw anvil RPC.
  # The solver's price-discovery reads go through that proxy (pinned + budgeted);
  # the simulator's executeIntent stays on these forks via the minotaur net.
  #
  # `tmpfs` on /root and /tmp keep Anvil's writable layer in RAM rather
  # than the container overlay. Reduces but does not eliminate disk
  # bloat (~40-50 GB/fork/day in current production, May 2026). The
  # every-6h recycle cron in docs/validator/quickstart.md is required.

  fork-cache:
    # Read-through JSON-RPC cache between the anvil forks and their upstream
    # archive providers (minotaur_subnet.harness.rpc_budget_proxy.fork_cache).
    # Caches ONLY immutable responses (explicit-block state reads, hash-keyed
    # lookups, chain constants); latest/pending and unknown methods forward.
    # A compose service (NOT api-managed like the block-pin proxy): anvil needs
    # its fork url at startup and the api needs anvil — api-managed would
    # deadlock a fresh host. FORK_CACHE_DISABLE=1 = forward-everything mode.
    image: ghcr.io/subnet112/minotaur-validator:${MINOTAUR_IMAGE_TAG:-stable}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec python -m minotaur_subnet.harness.rpc_budget_proxy.fork_cache"
    environment:
      UPSTREAMS: "eth=${ETH_UPSTREAM_RPC_URL:-},base=${BASE_UPSTREAM_RPC_URL:-},btevm=${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"
      LISTEN_PORT: "8650"
      # Warm the cache across restarts so a recreate (Watchtower/update.sh) skips
      # the cold re-fetch storm to the archive provider. Immutable data, so a
      # reload is always correct. Empty = off; default snapshots onto the volume.
      FORK_CACHE_PERSIST_PATH: "${FORK_CACHE_PERSIST_PATH:-/var/cache/fork-cache/snapshot.json}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8650/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - fork-cache-data:/var/cache/fork-cache
    # minotaur ONLY — the sealed benchmark-sandbox never reaches this (the
    # solver's reads go through the block-pin proxy at 172.30.0.5).
    networks: [minotaur]

  anvil-eth:
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8545"
      # Routed through the fork-cache service (read-through cache of
      # immutable state at explicit blocks) — the anvils re-fetch all
      # touched state per re-fork (--no-storage-caching below), which made
      # these fetches the dominant archive-provider compute-unit driver.
      # The cache is OUTSIDE anvil, so a solver cannot write to it: the
      # poisoning vector --no-storage-caching closes stays closed.
      - "--fork-url=http://fork-cache:8650/eth"
      - "--chain-id=1"
      # Reads through to upstream every call (no in-anvil state cache).
      # Reduces the attack surface for cache-based exploitation by a
      # malicious solver — without this, a bias written via
      # anvil_setStorageAt could persist in anvil's read cache even
      # after our snapshot/revert restores the underlying state.
      # anvil-base + anvil-btevm already carry this flag.
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
      # NOTE: no --block-time. The simulator force-mines every tx (evm_mine)
      # and re-forks to the upstream head before each simulation, so interval
      # mining is never used — it only burned CPU/RAM mining ~43k empty blocks
      # /day per fork. Anvil's default auto-mine (one block per tx) is correct
      # here. Validated on the subnet-team validator before this change.
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    # minotaur ONLY. The anvil forks are deliberately NOT on benchmark-sandbox:
    # an untrusted solver on that sealed net must reach the deterministic
    # block-pin proxy (.5) and nothing else. The simulator/api/validator reach
    # this fork via the minotaur hostname (ANVIL_RPC_URL=http://anvil-base:8546
    # etc.), so dropping the sandbox attachment does not affect execution.
    networks: [minotaur]

  anvil-base:
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8546"
      # Routed through fork-cache — see anvil-eth.
      - "--fork-url=http://fork-cache:8650/base"
      - "--chain-id=8453"
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
      # NOTE: no --block-time. The simulator force-mines every tx (evm_mine)
      # and re-forks to the upstream head before each simulation, so interval
      # mining is never used — it only burned CPU/RAM mining ~43k empty blocks
      # /day per fork. Anvil's default auto-mine (one block per tx) is correct
      # here. Validated on the subnet-team validator before this change.
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:8546:8546"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8546 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    # minotaur ONLY — see anvil-eth. Solver reaches Base state via the pin proxy.
    networks: [minotaur]

  anvil-btevm:
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8547"
      # Routed through fork-cache — see anvil-eth.
      - "--fork-url=http://fork-cache:8650/btevm"
      - "--chain-id=964"
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
      # NOTE: no --block-time — see anvil-eth above. Auto-mine (one block per
      # tx) is correct here; interval mining was unused 24/7 CPU/RAM burn.
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:8547:8547"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8547 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    # minotaur ONLY — see anvil-eth. Solver reaches BT EVM state via the pin proxy.
    networks: [minotaur]

  # ── Dedicated benchmark-worker forks (Phase 2 split — LEADER ONLY) ────
  # These three anvils exist ONLY for the split `benchmark-worker` service below.
  # They are gated behind the `benchmark-worker` compose profile, so they are
  # INERT on every node (followers on :stable get this file but never start them);
  # the LEADER activates them with COMPOSE_PROFILES=benchmark-worker.
  #
  # Why dedicated forks: the worker and the api both evm_snapshot / evm_revert +
  # re-fork their anvils around every scoreIntent. Sharing a fork would let the two
  # processes corrupt each other's simulation state → non-deterministic scoring
  # (a consensus hazard). The api's boot guard (_assert_worker_forks_isolated)
  # HARD-FAILS the worker if its *_SIM_RPC_URL still points at anvil-eth/base/btevm.
  #
  # They fork through the SAME `fork-cache` (immutable pinned state, read-through)
  # as the api's anvils, so a cache HIT means no extra archive-provider cost and —
  # critically — the worker forks the IDENTICAL pinned block the api/followers do.
  anvil-eth-bench:
    profiles: [benchmark-worker]
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--fork-url=http://fork-cache:8650/eth"   # SAME cache/slug as anvil-eth
      - "--chain-id=1"
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:18545:8545"   # distinct host port from anvil-eth (8545)
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [minotaur]

  anvil-base-bench:
    profiles: [benchmark-worker]
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8546"
      - "--fork-url=http://fork-cache:8650/base"   # SAME cache/slug as anvil-base
      - "--chain-id=8453"
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:18546:8546"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8546 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks: [minotaur]

  anvil-btevm-bench:
    profiles: [benchmark-worker]
    depends_on:
      - fork-cache
    image: ghcr.io/foundry-rs/foundry@sha256:8347b728d5d393dac1c018691b36f506d23b9dcd78341d40ea0fcb11c3a19cdd
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8547"
      - "--fork-url=http://fork-cache:8650/btevm"   # SAME cache/slug as anvil-btevm
      - "--chain-id=964"
      - "--no-storage-caching"
      - "--fork-retry-backoff=5000"
      - "--retries=10"
      - "--timeout=60000"
    tmpfs:
      - /root:size=2g
      - /tmp:size=512m
    ports:
      - "127.0.0.1:18547:8547"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8547 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    networks: [minotaur]

  # ── Block-pin RPC proxy (deterministic solver reads) ─────────────────
  # NOT a compose service ON PURPOSE. The proxy routes the solver's READS to the
  # validator's own upstream archive RPC, FORCED to the round's canonical fork
  # block — one ~30ms round-trip vs the Anvil fork lazily fetching every cold slot
  # (~15-30s), and every validator reads the SAME pinned state. The simulator's
  # EXECUTION (scoreIntent) stays on the Anvil forks above.
  #
  # The API LAUNCHES it as a managed container at startup (the same docker-socket-
  # proxy it uses for solver benchmarks), from the api's OWN image, on `.5` of the
  # sealed benchmark-sandbox net + `minotaur`. Why not a compose service: a new
  # service only reaches Watchtower-only validators if they pull the new compose,
  # whereas an api-launched container rides the normal :stable IMAGE update — zero
  # operator action. Self-configuring: UPSTREAMS reuse the RPCs you already set,
  # the control token reuses SOLVER_ROUND_INTERNAL_API_KEY, no new env. Disable
  # only with DISABLE_READ_PROXY=1 (dev/local without docker-socket access).
  # See minotaur_subnet/api/read_proxy_manager.py.

  # ── Validator daemon ─────────────────────────────────────────────────
  # Order-consensus follower role: receives proposals from the current
  # leader, re-simulates them on the local Anvil forks, signs approvals
  # if both JS and on-chain scores meet threshold. Emits weights to the
  # subnet 112 metagraph at the chain rate-limit cadence.
  #
  # Image is pinned to `:latest` in this example; in production, pin to
  # a specific sha-tagged image (ghcr.io/subnet112/minotaur-validator:sha-<sha>)
  # to avoid surprise upgrades. Watchtower auto-update lands in B.5.
  #
  # SECURITY: `:stable` is a MUTABLE tag. For production deployments,
  # pin by digest in your .env:
  #     MINOTAUR_IMAGE_TAG=stable@sha256:<digest>
  # See docs/operator/image-pinning.md for the full procedure and the
  # cosign verification workflow once PR-5 lands.

  validator:
    image: ghcr.io/subnet112/minotaur-validator:${MINOTAUR_IMAGE_TAG:-stable}
    restart: unless-stopped
    labels:
      # Tell Watchtower to auto-update this container when :stable moves
      com.centurylinklabs.watchtower.enable: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      # --epoch-seconds 1300: weight-emission cadence. sn112's weights_rate_limit
      # is ~100 blocks (~1200s); emitting AT 1200 risks landing a hair early
      # (block-time jitter + processing latency) and getting rejected "too fast".
      # 1300 clears the window with ~100s margin so emits reliably land.
      - "exec python -m minotaur_subnet.validator.main --port 9100 --epoch-seconds 1300"
    ports:
      # MUST be reachable from the current leader for proposal broadcast.
      # If behind NAT, forward 9100/tcp to this host.
      - "0.0.0.0:9100:9100"
    depends_on:
      anvil-eth:
        condition: service_healthy
      anvil-base:
        condition: service_healthy
      anvil-btevm:
        condition: service_healthy
    environment:
      # Bittensor identity
      WALLET_NAME: "${WALLET_NAME}"
      HOTKEY_NAME: "${HOTKEY_NAME}"
      SUBTENSOR_URL: "${SUBTENSOR_URL:-finney}"
      NETUID: "${NETUID:-112}"

      # Public URL where this daemon serves /identity for peer discovery.
      VALIDATOR_AXON_URL: "${VALIDATOR_AXON_URL}"

      # EVM signing key (no funds, just identity)
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_PRIVATE_KEY:?empty signing key would silently disable round certification - set it in your env file}"

      # Per-chain ValidatorRegistry addresses
      # (current values in docs/operator/network-reference.md)
      VALIDATOR_REGISTRY_8453: "${VALIDATOR_REGISTRY_8453}"
      VALIDATOR_REGISTRY_964: "${VALIDATOR_REGISTRY_964}"

      # AppRegistry addresses — off-chain gate that mirrors the on-chain
      # AppRegistry.isRegistered() check
      APP_REGISTRY_8453: "${APP_REGISTRY_8453}"
      APP_REGISTRY_964: "${APP_REGISTRY_964}"

      # Sim-fork RPCs (internal anvil) — used ONLY for executeIntent simulation.
      ANVIL_RPC_URL: http://anvil-base:8546
      BASE_SIM_RPC_URL: http://anvil-base:8546
      BITTENSOR_EVM_SIM_RPC_URL: http://anvil-btevm:8547
      # Live-chain read RPCs — AppRegistry / ValidatorRegistry / score / gas.
      # MUST be the LIVE chains, NOT the sim forks: a freshly-registered app
      # contract (or any live on-chain state) must be visible immediately, not
      # only after the next anvil re-fork. Reuses the same upstreams Anvil forks.
      BASE_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      ETH_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"

      # Upstream RPCs — used when Anvil restarts to re-fork at the
      # current head. Public BT EVM RPC is fine; ETH + Base need your
      # own (Alchemy / Infura / etc).
      ETH_UPSTREAM_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BASE_UPSTREAM_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_UPSTREAM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"

      # Primary chain for default consensus context
      CHAIN_ID: "8453"

      # Consensus mode + safety
      CONSENSUS_MODE: "real"
      CONSENSUS_REQUIRE_SIGNED_PROPOSALS: "1"
      FOLLOWER_PROPOSAL_RESIMULATE: "${FOLLOWER_PROPOSAL_RESIMULATE:-1}"

      # On every proposal, re-check the proposer's recovered address
      # against the on-chain ValidatorRegistry (not just the in-memory
      # peer cache, which can be stale by up to 300s after a slash/removal).
      CONSENSUS_ENFORCE_ONCHAIN_REGISTRY: "${CONSENSUS_ENFORCE_ONCHAIN_REGISTRY:-1}"

      # Score threshold (network norm)
      SCORE_THRESHOLD: "${SCORE_THRESHOLD:-5000}"

      # App catalog sync — pulls AppIntentDefinition (incl. js_code) and
      # DeploymentResult from the leader's API every minute. Required for
      # third-party validators: without it the local store stays empty,
      # JsExecutionEngine has no scoring code loaded, and re-scoring of
      # incoming consensus proposals fails. Leaders should leave this unset.
      LEADER_API_URL: "${LEADER_API_URL:-https://api.minotaursubnet.com}"
      # Champion source for weight emission: THIS node's CO-LOCATED api (single source of
      # truth — it ran consensus + adopted). Read over HTTP; the validator holds no champion
      # state of its own. MUST be the operator's OWN api, NEVER the public leader
      # (anti-free-ride). Default matches the api service name + port below.
      CHAMPION_API_URL: "${CHAMPION_API_URL:-http://api:8080}"
    volumes:
      # Bittensor wallet directory — read-only.
      - "${BITTENSOR_WALLET_PATH:-${HOME}/.bittensor/wallets}:/home/minotaur/.bittensor/wallets:ro"
    networks: [minotaur]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ── API service (champion-consensus follower) ────────────────────────
  # Signs champion certification proposals from the current leader.
  # Re-benchmarks the candidate solver inside a sandboxed Docker container
  # before signing (peer integrity check — leader can't push a bad champion
  # through if peers re-bench and disagree).
  #
  # Same image as the validator daemon, different entrypoint. The
  # docker-socket-proxy side-container limits this service's Docker
  # access to just `containers/create + start + wait + logs + remove` —
  # it cannot inspect or exec arbitrary containers on the host.
  #
  # SECURITY: same image, same pinning guidance — set
  # MINOTAUR_IMAGE_TAG=stable@sha256:<digest> in your .env for
  # production. See docs/operator/image-pinning.md.

  api:
    image: ghcr.io/subnet112/minotaur-validator:${MINOTAUR_IMAGE_TAG:-stable}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec python -m minotaur_subnet.api.server --port 8080"
    ports:
      # MUST be reachable from the current leader for champion-consensus
      # proposals (POST /v1/submissions/champion-consensus/propose).
      - "0.0.0.0:8080:8080"
    depends_on:
      anvil-eth:
        condition: service_healthy
      anvil-base:
        condition: service_healthy
      anvil-btevm:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      # Same Bittensor identity as the validator daemon — both processes
      # use the same hotkey + EVM signing key.
      WALLET_NAME: "${WALLET_NAME}"
      HOTKEY_NAME: "${HOTKEY_NAME}"
      SUBTENSOR_URL: "${SUBTENSOR_URL:-finney}"
      NETUID: "${NETUID:-112}"
      VALIDATOR_AXON_URL: "${VALIDATOR_AXON_URL}"
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_PRIVATE_KEY:?empty signing key would silently disable round certification - set it in your env file}"

      # Singleton relayer: the api submits signed quorum bundles here.
      # Third-party validators do NOT hold a gas wallet — the subnet
      # team's relayer at https://relayer.minotaursubnet.com is the
      # only address that ever pays gas for swap execution. Wrapped in
      # an EIP-191 freshness signature using VALIDATOR_PRIVATE_KEY above;
      # the relayer rejects bundles whose wrapper signer isn't in the
      # on-chain ValidatorRegistry.
      RELAYER_URL: "${RELAYER_URL:-https://relayer.minotaursubnet.com}"

      # Per-chain registry addresses
      VALIDATOR_REGISTRY_8453: "${VALIDATOR_REGISTRY_8453}"
      VALIDATOR_REGISTRY_964: "${VALIDATOR_REGISTRY_964}"
      APP_REGISTRY_8453: "${APP_REGISTRY_8453}"
      APP_REGISTRY_964: "${APP_REGISTRY_964}"
      CHAMPION_REGISTRY_964: "${CHAMPION_REGISTRY_964}"

      # Champion consensus reads validators from BT EVM ValidatorRegistry
      # and quorum from ChampionRegistry (both on chain 964).
      CHAMPION_CONSENSUS_CHAIN_ID: "964"

      # Sim-fork RPCs (internal anvil) — used ONLY for executeIntent simulation.
      ANVIL_RPC_URL: http://anvil-base:8546
      BASE_SIM_RPC_URL: http://anvil-base:8546
      BITTENSOR_EVM_SIM_RPC_URL: http://anvil-btevm:8547
      # Live-chain read RPCs — AppRegistry / ValidatorRegistry / score / gas.
      # MUST be the LIVE chains, NOT the sim forks: a freshly-registered app
      # contract (or any live on-chain state) must be visible immediately, not
      # only after the next anvil re-fork. Reuses the same upstreams Anvil forks.
      BASE_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      ETH_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"

      # Upstream RPCs for refork-time state
      ETH_UPSTREAM_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BASE_UPSTREAM_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_UPSTREAM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"

      CHAIN_ID: "8453"
      CONSENSUS_MODE: "real"
      CONSENSUS_REQUIRE_SIGNED_PROPOSALS: "1"

      # Follower role — these are LEADER-ONLY responsibilities:
      ENABLE_SOLVER_ROUND_COORDINATOR: "0"  # Leader manages round lifecycle
      ENABLE_BENCHMARK_WORKER: "0"          # Proactive bench is leader-only
      SUBMISSIONS_ACCEPTING: "0"            # Users send submissions to the leader

      # Reactive benchmark (runs when a champion proposal arrives) DOES
      # still happen on followers — that's the peer integrity check. The
      # api spawns the solver container via the docker-socket-proxy.
      # NOTE: ALLOW_CHAMPION_HOT_SWAP now DEFAULTS ON in code (a bare :stable
      # 3rd-party validator hot-swaps adopted champions without setting it, so
      # the fleet runs the same solver bytes). This line is redundant but kept
      # explicit; set it to "0" only as a break-glass.
      ALLOW_CHAMPION_HOT_SWAP: "1"
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
      # Pin the docker client API version. Unpinned, the modern CLI negotiates a version
      # whose probe the socket-proxy 403s for `docker inspect <id>` — which leaves the
      # api-launched proxy unable to detect an api-image change (it falls back to leaving
      # the running proxy, so it wouldn't track a consensus-relevant rewrite-table version
      # bump). Pinned, inspect works and the proxy is refreshed when the api image changes.
      # (Watchtower pins this too, for the same socket-proxy reason.)
      DOCKER_API_VERSION: "1.45"

      # Benchmark sandbox network — the api launches solver containers
      # into this sealed network so they can't reach the internet but
      # can hit the local anvils for price discovery.
      BENCHMARK_DOCKER_NETWORK: "benchmark-sandbox"
      # .5 (the block-pin proxy) is the ONLY host the solver can reach on the
      # sealed benchmark-sandbox net. The .2/.3/.4 anvils have been removed from
      # this net (see the anvil services above) so a malicious solver can no
      # longer dial a fork directly to call anvil_setStorageAt or read off the
      # pin+budget. The honest solver's reads go proxy → upstream archive at the
      # round fork block (via init_config rpc_urls, set per-run by run_benchmark).
      # The simulator's executeIntent still reaches the anvils on the minotaur net
      # (ANVIL_RPC_URL=http://anvil-base:8546 above) — unaffected.
      #
      # BENCHMARK_ANVIL_RPC_* are KEPT pointing at the now-DEAD anvil sandbox IPs
      # on purpose. start_docker writes these into the solver's container env
      # (ANVIL_RPC_URL/BASE_RPC_URL/BITTENSOR_EVM_RPC_URL, a backward-compat path);
      # with the anvils gone from the sandbox these resolve to UNREACHABLE IPs — a
      # dead end, never a live fork. Do NOT unset them: BASE_RPC_URL would then
      # fall back to the upstream ARCHIVE url (which carries the provider API key)
      # and leak it into the untrusted solver's env. A dead IP beats a leaked key.
      BENCHMARK_ALLOWED_HOSTS: "172.30.0.5"
      BENCHMARK_ANVIL_RPC_ETH: "http://172.30.0.2:8545"
      BENCHMARK_ANVIL_RPC_BASE: "http://172.30.0.3:8546"
      BENCHMARK_ANVIL_RPC_BTEVM: "http://172.30.0.4:8547"

      # Block-pin RPC proxy — the solver's reads route through it, pinned to the
      # round fork block (deterministic, ~30ms). The api LAUNCHES + owns the proxy
      # container at startup and exports SOLVER_READ_PROXY* itself (from its own
      # image, reusing the upstream RPCs + SOLVER_ROUND_INTERNAL_API_KEY above), so
      # there is NOTHING to set here — it rides the :stable image update with no
      # compose change. The budget + rewrite-table are uniform CODE constants (not
      # env) — every validator folds the SAME value into benchmark_pack_hash.
      # Disable only with DISABLE_READ_PROXY=1 (dev/local without docker access).

      # Determinism — the production mechanism is AUTOMATIC and per-round, and
      # is now ON BY DEFAULT IN CODE (shipped via :stable). Every validator
      # independently derives the SAME canonical fork block from the round's
      # epoch anchor — no env to set, no manual per-round block coordination.
      # This is intentionally NOT a per-validator env: consensus-relevant config
      # must be uniform code (like CHAMPION_MINER_WEIGHT_FRACTION / EPOCH_SECONDS)
      # so a third-party validator can never split off the fleet by not setting it.
      #
      # HARD REQUIREMENT: every validator MUST provide a Base upstream RPC
      # (BASE_UPSTREAM_RPC_URL / BASE_RPC_URL). Without it the pin cannot derive,
      # the node defers to live head, and its benchmark_pack_hash diverges from
      # pinning peers → it FAILS the pack-hash check and cannot sign (fail-loud,
      # never a silent mis-score). This is the SAFE failure mode, but it drops the
      # node out of the adoption quorum — so the RPC is mandatory.
      #
      # EMERGENCY OVERRIDE ONLY (do not set in normal operation): to disable the
      # mechanism fleet-wide without a code revert, set one of
      #   ROUND_ANCHORED_PIN: "0"   (also accepts false/no/off, case-insensitive)
      # Unset or any other value = enabled (default). A typo can never silently
      # disable a single node and split it off — only the explicit off-set does.
      #
      # Pre-flight parity check (default-ON, observe-only): a background probe
      # derives this node's fork pin for the current epoch anchor and publishes
      # it on GET /health under "round_anchor" (pins, pin_hashes, anchor_epoch,
      # status, gate_enabled). The subnet team polls every validator's /health and
      # diffs the pin (and block hash) per epoch to confirm the WHOLE fleet derives
      # an identical block — the parity evidence backing the default-ON rollout. It
      # never changes consensus and runs with a bounded RPC timeout. The probe runs
      # regardless of the gate. Opt out (not recommended) with ROUND_ANCHOR_PARITY: "0".
      #
      # SHADOW (recommended before flipping the gate): set ROUND_ANCHOR_SHADOW: "1"
      # fleet-wide while ROUND_ANCHORED_PIN stays "0". Each validator then derives
      # and LOGS the pin it would use (and the would-be benchmark_pack_hash) with
      # ZERO consensus effect — nothing is bound, stored, or scored. Diff the
      # `[round-anchor-shadow]` log lines across the fleet for the same round:
      # identical `pin_segment`/`would_be_pack_hash` everywhere ⇒ safe to enable.
      # Divergence here is exactly the silent mis-score the gate would have caused,
      # surfaced harmlessly. ROUND_ANCHOR_SHADOW is a no-op once ROUND_ANCHORED_PIN
      # is on (the live path already derives + logs + binds).
      # ROUND_ANCHOR_SHADOW: "0"  # default off; flip to 1 to observe before enabling
      #
      # The env pins below are DEV/TEST-ONLY manual overrides and are IGNORED
      # when ROUND_ANCHORED_PIN is on (do not set them in production):
      # BENCHMARK_EPOCH_BLOCK: "<base block>"      # dev/test only
      # BENCHMARK_CORPUS_TO_BLOCK: "<base block>"  # dev/test only

      # Admin gate — REQUIRED on third-party validators. Without it, the
      # default `RELAYER_URL` above + the wrapper-sig the api adds from
      # `VALIDATOR_PRIVATE_KEY` means any anonymous internet caller can
      # POST /v1/apps/{id}/deploy and have the subnet team's relayer pay
      # gas for arbitrary contract deploys until the relayer's daily cap
      # is exhausted. `${VAR:?msg}` makes `docker compose up` fail fast
      # if the operator left it unset.
      ADMIN_API_KEY: "${ADMIN_API_KEY:?ADMIN_API_KEY is required — generate with: openssl rand -hex 32}"

      # Champion-consensus proposal endpoint gate. Without this, anyone
      # on the public internet can POST /v1/solver/round/consensus/proposal
      # to your api and trigger Docker container spawn via the
      # docker-socket-proxy on an attacker-named image tag. Shared with
      # the leader at registration; the leader signs all proposals with
      # this key in an Authorization: Bearer header.
      SOLVER_ROUND_INTERNAL_API_KEY: "${SOLVER_ROUND_INTERNAL_API_KEY:?SOLVER_ROUND_INTERNAL_API_KEY is required — generate with: openssl rand -hex 32 and send to the subnet team at registration time}"

      # Defense-in-depth: also require an EIP-191 signature on every
      # champion proposal (recovered against the on-chain ValidatorRegistry).
      # Default-on so a leaked SOLVER_ROUND_INTERNAL_API_KEY alone isn't
      # sufficient — attacker would also need a registered validator key.
      CONSENSUS_REQUIRE_SIGNED_CHAMPION_PROPOSALS: "${CONSENSUS_REQUIRE_SIGNED_CHAMPION_PROPOSALS:-1}"

      # On every proposal, re-check the proposer's recovered address
      # against the on-chain ValidatorRegistry (not just the in-memory
      # peer cache, which can be stale by up to 300s after a slash/removal).
      CONSENSUS_ENFORCE_ONCHAIN_REGISTRY: "${CONSENSUS_ENFORCE_ONCHAIN_REGISTRY:-1}"
    volumes:
      - "${BITTENSOR_WALLET_PATH:-${HOME}/.bittensor/wallets}:/home/minotaur/.bittensor/wallets:ro"
      - store-data:/data
    networks: [minotaur]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      # /health is slow (>5s) during the heavy cold-start — the startup lifespan
      # resumes the stranded-submission backlog, builds the live champion, and
      # benchmarks, pegging a core for ~100s. start_period keeps those early
      # failures from flipping the container to "unhealthy" (which reads as an
      # outage and blocks dependents) before it has had a chance to settle.
      timeout: 10s
      retries: 20
      start_period: 180s

  # ── Benchmark worker (Phase 2 process split — LEADER ONLY) ────────────
  # Runs the benchmark SLATE (scoring challenger submissions) in a SEPARATE
  # process so the sim no longer stalls the api's asyncio event loop (the api is
  # one GIL-bound process; a scoreIntent pass pegged a core and froze /health).
  #
  # Gated behind the `benchmark-worker` compose profile → INERT everywhere by
  # default. Followers on :stable receive this file but never start it. The LEADER
  # activates the whole split (this service + the three anvil-*-bench forks above)
  # with COMPOSE_PROFILES=benchmark-worker in its .env, AND flips the api to
  # ENABLE_BENCHMARK_WORKER=0 so the api hands the slate to this worker (the api
  # still re-benches the single incumbent on its own loop — see startup.py).
  #
  # SAME IMAGE as the api — MUST run the identical digest (scoring is a consensus
  # quantity). update.sh keeps them in lockstep when the leader sets
  # MINOTAUR_UPDATE_SERVICES to include `benchmark-worker` (see that script).
  #
  # SAFETY MODEL (all enforced by code gates in startup.py / round_store.py, keyed
  # on BENCHMARK_WORKER_ONLY):
  #   • round-store READ-ONLY: no round bootstrap, non-persisting fork-pin
  #     resolver, no orphan-temp sweep (would delete the api's in-flight persist
  #     temp on the shared /data volume), GET /solver/champion skips its lazy write.
  #   • no screening resume + no stale-deploy reconcile (the api owns those; a
  #     second runner would double Docker builds / corrupt a live deploy).
  #   • UNREACHABLE from untrusted code: no published host port + `minotaur` net
  #     ONLY (never benchmark-sandbox), so the sealed solver containers it spawns
  #     cannot dial its routes. This is the router gate — the worker mounts the
  #     full app but nothing outside the trusted net can reach it.
  benchmark-worker:
    profiles: [benchmark-worker]
    image: ghcr.io/subnet112/minotaur-validator:${MINOTAUR_IMAGE_TAG:-stable}
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    entrypoint: ["/bin/sh", "-c"]
    # Binds 8080 for its OWN healthcheck only — NOT published to the host.
    command:
      - "exec python -m minotaur_subnet.api.server --port 8080"
    # NO `ports:` — intentionally unreachable from the host and from the sandbox.
    depends_on:
      anvil-eth-bench:
        condition: service_healthy
      anvil-base-bench:
        condition: service_healthy
      anvil-btevm-bench:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      # ── identity (same hotkey/EVM key as the api) ────────────────────
      WALLET_NAME: "${WALLET_NAME}"
      HOTKEY_NAME: "${HOTKEY_NAME}"
      SUBTENSOR_URL: "${SUBTENSOR_URL:-finney}"
      NETUID: "${NETUID:-112}"
      VALIDATOR_PRIVATE_KEY: "${VALIDATOR_PRIVATE_KEY:?empty signing key}"

      # ── ROLE: dedicated benchmark worker ─────────────────────────────
      BENCHMARK_WORKER_ONLY: "1"          # activates every worker-mode code gate
      ENABLE_BENCHMARK_WORKER: "1"        # THIS process runs the slate run_loop
      DISABLE_BLOCK_LOOP: "1"             # no block loop / EpochManager here
      ENABLE_SOLVER_ROUND_COORDINATOR: "0"  # the api owns the round lifecycle
      SUBMISSIONS_ACCEPTING: "0"          # users submit to the leader api, not here
      DISABLE_READ_PROXY: "1"             # the api LAUNCHES + owns the pin proxy;
                                          # the worker must not launch a second one

      # ── DEDICATED sim forks (isolated snapshot/revert — see the boot guard) ──
      ANVIL_RPC_URL: http://anvil-base-bench:8546
      ETH_SIM_RPC_URL: http://anvil-eth-bench:8545
      BASE_SIM_RPC_URL: http://anvil-base-bench:8546
      BITTENSOR_EVM_SIM_RPC_URL: http://anvil-btevm-bench:8547

      # ── live read RPCs + upstreams (SAME as the api — must fork-pin identically) ──
      BASE_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      ETH_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"
      ETH_UPSTREAM_RPC_URL: "${ETH_UPSTREAM_RPC_URL}"
      BASE_UPSTREAM_RPC_URL: "${BASE_UPSTREAM_RPC_URL}"
      BITTENSOR_EVM_UPSTREAM_RPC_URL: "${BITTENSOR_EVM_UPSTREAM_RPC_URL:-https://lite.chain.opentensor.ai}"
      CHAIN_ID: "8453"
      CONSENSUS_MODE: "real"

      # ── shared block-pin read proxy (the api's, at sandbox .5) ───────
      # DISABLE_READ_PROXY=1 above means this process does NOT launch a proxy, so
      # it must be TOLD where the api's proxy is. The solver containers it spawns
      # dial the DATA plane at 172.30.0.5:8645 (sealed sandbox); this process dials
      # the CONTROL plane by the proxy's container name to set the per-run pin. The
      # control token is the same secret the api uses (SOLVER_ROUND_INTERNAL_API_KEY),
      # here provided ONLY as the proxy token — the worker has no inbound consensus
      # routes reachable (no port, minotaur-only), so it is not an auth gate here.
      SOLVER_READ_PROXY: "http://172.30.0.5:8645"
      SOLVER_READ_PROXY_CONTROL: "http://minotaur-rpc-pin-proxy:8645"
      SOLVER_READ_PROXY_TOKEN: "${SOLVER_ROUND_INTERNAL_API_KEY:?proxy control token}"

      # ── solver-spawn sandbox (identical to the api) ──────────────────
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
      DOCKER_API_VERSION: "1.45"
      BENCHMARK_DOCKER_NETWORK: "benchmark-sandbox"
      # Keep these at the now-DEAD sandbox anvil IPs (see the api service note): a
      # dead IP is a safe dead end; UNSETTING them would leak the archive key into
      # the untrusted solver's env.
      BENCHMARK_ALLOWED_HOSTS: "172.30.0.5"
      BENCHMARK_ANVIL_RPC_ETH: "http://172.30.0.2:8545"
      BENCHMARK_ANVIL_RPC_BASE: "http://172.30.0.3:8546"
      BENCHMARK_ANVIL_RPC_BTEVM: "http://172.30.0.4:8547"

      # ── forward-progress heartbeat (drives the healthcheck below) ────
      BENCHMARK_WORKER_HEARTBEAT_FILE: "/data/.benchmark_worker_heartbeat"
    volumes:
      - "${BITTENSOR_WALLET_PATH:-${HOME}/.bittensor/wallets}:/home/minotaur/.bittensor/wallets:ro"
      - store-data:/data              # SHARED with the api (read-only sharer of round state)
    networks: [minotaur]              # NOT benchmark-sandbox — see the router-gate note
    healthcheck:
      # FORWARD-PROGRESS, not just liveness: the run_loop bumps the heartbeat file
      # each iteration AND each per-image bench step, so a wedged/hung sim call
      # goes stale → container unhealthy → the operator's restarter (or update.sh's
      # force-recreate of unhealthy services) recycles it. Threshold generous
      # enough for a full slate pass; tune with BENCHMARK_WORKER_HEARTBEAT_MAX_AGE.
      test:
        - "CMD-SHELL"
        - "test $(( $(date +%s) - $(stat -c %Y ${BENCHMARK_WORKER_HEARTBEAT_FILE:-/data/.benchmark_worker_heartbeat} 2>/dev/null || echo 0) )) -lt ${BENCHMARK_WORKER_HEARTBEAT_MAX_AGE:-900}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s              # cold start: build live champion, first fork, first pass

  # ── Watchtower — auto-update validator + api on :stable promotion ─────
  # Polls GHCR every hour for a new image SHA on the configured tag (default
  # :stable). When the SHA moves, Watchtower pulls the new image, stops the
  # affected containers, and recreates them with the new image. The subnet
  # team controls when :stable moves by merging the integration branch
  # (`develop`, which feeds :latest) into `main` after a release has
  # soaked on our own validator — :stable is built straight from `main`.
  # So third-party validators don't get surprise upgrades from every
  # in-flight commit.
  #
  # Trust note: Watchtower needs full Docker socket access to stop+recreate
  # containers. This is the second container in this stack with that access
  # (docker-socket-proxy is the first, but it proxies a *filtered* subset
  # — Watchtower needs the unrestricted socket). Containrrr's Watchtower
  # is a widely-deployed maintenance image; if you're uncomfortable with the
  # trust model, set MINOTAUR_DISABLE_WATCHTOWER=1 in your .env (the
  # ``profiles: [autoupdate]`` directive below makes this service opt-out)
  # and run `docker compose pull && docker compose up -d` manually on the
  # cadence we publish.
  #
  # ROBUSTNESS NOTE (recommended for high-stake validators): Watchtower
  # recreates on a tag move WITHOUT honouring the anvil ``service_healthy``
  # depends_on above, and never rolls back a broken update — so a new :stable
  # can start the api/validator against cold anvil forks and leave the node
  # down. Prefer the health-gated updater ``./update.sh`` (pulls, recreates
  # with ``up -d --wait``, auto-rolls-back on failure). Drop the
  # ``autoupdate`` profile and cron it instead. See docs/validator/updating.md.

  watchtower:
    # Pinned by digest (audit H10). Without this a hostile re-push to
    # the 1.7.1 tag would be auto-pulled — and Watchtower runs with
    # full Docker-socket access. Refresh procedure (must manually
    # review the new digest's release notes first):
    #     docker buildx imagetools inspect containrrr/watchtower:1.7.1 \
    #       --format '{{ json .Manifest.Digest }}'
    # Captured 2026-05-26 against containrrr/watchtower:1.7.1.
    image: containrrr/watchtower:1.7.1@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038
    restart: unless-stopped
    profiles: [autoupdate]
    environment:
      WATCHTOWER_POLL_INTERVAL: "3600"      # 1 hour
      WATCHTOWER_CLEANUP: "true"             # remove old image after upgrade
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_LABEL_ENABLE: "true"        # only update labelled containers
      WATCHTOWER_NOTIFICATIONS: ""           # silent — host-side monitoring should watch instead
      # Pin the Docker client API version. Watchtower 1.7.1's bundled SDK
      # defaults to API v1.25 which Docker daemon ≥25 rejects ("client
      # version 1.25 is too old"). Forcing a newer client version fixes it.
      DOCKER_API_VERSION: "1.45"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [minotaur]

  # ── docker-socket-proxy — limit api's Docker access ──────────────────
  # Mounts /var/run/docker.sock read-only and exposes a filtered subset
  # of the Docker API on tcp://docker-socket-proxy:2375. The api reaches
  # it via the DOCKER_HOST env above. Without this proxy, the api would
  # need full read-write access to the host's Docker socket, which is
  # effective root on the host.
  #
  # Allowed: containers (read+create+start+wait+logs+rm), networks (for
  # attaching solver containers to benchmark-sandbox), images (for pulling
  # solver images). NOT allowed: exec, host control, build, services,
  # swarm, anything that would let a compromised api take over the host.

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: unless-stopped
    environment:
      LOG_LEVEL: warning
      # haproxy defaults to 1-minute idle timeouts, which is too short for
      # `docker run --rm -i`-style invocations with attached stdio (the
      # solver subprocess waits idle on stdin between commands). When the
      # proxy cuts the tunnel, the docker CLI exits, the solver container
      # exits, and the api holds a dead session reference until the next
      # request raises SolverCrashedError. TIMEOUT_TUNNEL is the load-
      # bearing one for stdio-attached `docker run`; client/server are
      # bumped to match so any in-flight harness command also survives.
      TIMEOUT_CONNECT: "30"
      TIMEOUT_CLIENT: "3600"
      TIMEOUT_SERVER: "3600"
      TIMEOUT_TUNNEL: "86400"
      # Read endpoints (HTTP GET)
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VERSION: 1
      INFO: 1
      # Write endpoints (HTTP POST/DELETE) — required to spawn benchmark
      # containers
      POST: 1
      # Explicitly deny everything else
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [minotaur]
    # Not exposed to host — only the api service can reach it via the
    # internal docker network.

volumes:
  store-data:
  # Fork-cache snapshot (immutable historical state) — survives restarts so the
  # cache warm-loads instead of cold-refetching from the archive provider.
  fork-cache-data:

networks:
  # Main bridge — validator, api, anvils, docker-socket-proxy.
  minotaur:
    driver: bridge

  # Sealed network for benchmark containers spawned by the api during
  # reactive champion verification. `internal: true` removes the Docker-
  # installed MASQUERADE rule, so containers attached only to this
  # network cannot egress to the internet, the host, or other Docker
  # networks.
  #
  # The ONLY non-solver endpoint on this net is the api-launched block-pin
  # proxy at 172.30.0.5:8645 (see read_proxy_manager.py). The three anvil
  # forks are deliberately NOT attached here (they live on `minotaur` only),
  # so an untrusted solver can reach the proxy and nothing else — it has no
  # route to a raw anvil RPC at all.
  #
  # PR-7 / audit C4 defense-in-depth NOTE FOR OPERATORS:
  #   Anvil exposes the `anvil_*` / `hardhat_*` / `evm_*` JSON-RPC
  #   namespaces unauthenticated by design — anvil has no flag to
  #   disable them. Keeping the anvils OFF this sealed network is the
  #   primary containment: a solver simply cannot dial them. The block-pin
  #   proxy is read-only by contract — it REJECTS anvil_*/evm_*/hardhat_*/
  #   ots_* and all state-changing methods (rpc_budget_proxy/rewrite_table.py)
  #   on every PINNED chain — so even the one reachable endpoint cannot be
  #   used to mutate fork state. (Caveat: rejection is applied per pinned
  #   chain; a routed chain with no pin forwards transparently. Today the
  #   proxy's upstreams are live ARCHIVE RPCs, not the anvils, so a write
  #   there cannot poison a fork the simulator re-reads — but see the
  #   eth/btevm handling in the api env block before routing more chains.)
  #
  #   The application-layer boundary that backstops the simulator's own
  #   executeIntent fork (minotaur_subnet/simulator/anvil_simulator.py) is
  #   unchanged: per-simulation evm_snapshot + evm_revert, a startup baseline
  #   snapshot (SimulatorStateError on revert failure), and a periodic
  #   _assert_baseline_alive() probe that forces a re-fork on mismatch.
  #
  #   If you suspect a fork has been poisoned despite the above:
  #     docker compose restart anvil-eth anvil-base anvil-btevm
  #   See docs/operator/anvil-isolation.md for the full runbook.
  benchmark-sandbox:
    name: benchmark-sandbox
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
